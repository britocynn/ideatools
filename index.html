<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Idea Generator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#F5F1E8;
color:#2B2B2B;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
margin-bottom:10px;
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#C6A96B;
border:none;
padding:14px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.result{
margin-top:30px;
text-align:left;
background:white;
padding:20px;
border-radius:10px;
}

.idea{
margin-bottom:10px;
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Business Idea Generator</h1>
<p id="subtitle">Generate business ideas in seconds</p>

<select id="language" onchange="updateLanguage()">
<option value="en">English</option>
<option value="pt">Português</option>
</select>

<input id="interest" placeholder="Industry or interest">

<button id="generateBtn" onclick="generateIdeas()">Generate Ideas</button>

<div id="result" class="result"></div>
  <button id="copyBtn" onclick="copyIdeas()">Copy Ideas</button>

</div>

<script>

 function updateLanguage() {
  let language = document.getElementById("language").value;

if (language === "pt") {
  document.getElementById("title").innerText = "Gerador de Ideias de Negócio";
  document.getElementById("subtitle").innerText = "Gera ideias de negócio em segundos";
  document.getElementById("interest").placeholder = "Indústria ou interesse";
  document.getElementById("generateBtn").innerText = "Gerar Ideias";
  document.getElementById("copyBtn").innerText = "Copiar Ideias";
} else {
  document.getElementById("title").innerText = "Business Idea Generator";
  document.getElementById("subtitle").innerText = "Generate business ideas in seconds";
  document.getElementById("interest").placeholder = "Industry or interest";
  document.getElementById("generateBtn").innerText = "Generate Ideas";
  document.getElementById("copyBtn").innerText = "Copy Ideas";
}

function generateIdeas(){

let interest = document.getElementById("interest").value;
let language = document.getElementById("language").value;

if(interest === ""){
alert("Please enter an interest / Introduz um interesse");
return;
}

let ideas_en = [
{
name: "Accounting Templates Store",
desc: "Sell ready-to-use accounting spreadsheets, trackers, and business templates.",
why: "Small business owners want practical tools that save time."
},
{
name: "Accounting for Freelancers",
desc: "Offer specialized accounting support and digital guides for freelancers and self-employed professionals.",
why: "Freelancers often need simple and accessible financial help."
},
{
name: "Finance Mini Course",
desc: "Create a short online course teaching the essentials of " + interest + " in a practical way.",
why: "People prefer fast and focused learning solutions."
},
{
name: "Niche Consulting Service",
desc: "Build a consulting service focused on businesses that need help with " + interest + ".",
why: "Specialized services are easier to position and sell."
},
{
name: "Digital Content Brand",
desc: "Create a content page around " + interest + " and monetize through ebooks, services, and partnerships.",
why: "Strong niche content can attract trust and recurring revenue."
}
];

let ideas_pt = [
{
name: "Loja de Templates de Contabilidade",
desc: "Vender folhas de cálculo, trackers e modelos prontos a usar relacionados com " + interest + ".",
why: "Pequenos empresários procuram ferramentas práticas que lhes poupem tempo."
},
{
name: "Contabilidade para Freelancers",
desc: "Oferecer apoio especializado e guias digitais para freelancers e trabalhadores independentes.",
why: "Muitos freelancers precisam de ajuda financeira simples e acessível."
},
{
name: "Mini Curso de Finanças",
desc: "Criar um curso online curto que ensine o essencial de " + interest + " de forma prática.",
why: "As pessoas preferem soluções de aprendizagem rápidas e objetivas."
},
{
name: "Serviço de Consultoria de Nicho",
desc: "Criar um serviço de consultoria focado em negócios que precisam de apoio em " + interest + ".",
why: "Serviços especializados são mais fáceis de posicionar e vender."
},
{
name: "Marca de Conteúdo Digital",
desc: "Criar uma página de conteúdo sobre " + interest + " e monetizar com ebooks, serviços e parcerias.",
why: "Conteúdo de nicho forte pode atrair confiança e receita recorrente."
}
];

let ideas = language === "en" ? ideas_en : ideas_pt;

let html = "";

ideas.forEach(function(idea, index){

html += "<div class='idea'>";
html += "<b>" + (index+1) + ". " + idea.name + "</b><br><br>";
html += "<span>" + idea.desc + "</span><br><br>";
html += "<i>" + idea.why + "</i>";
html += "</div>";

});

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
