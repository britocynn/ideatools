<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Idea Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #3c2b16 0%, #1b1712 22%, #121212 58%, #0f0f0f 100%);
      color: #f5ead9;
      text-align: center;
      padding: 36px 18px 60px;
      min-height: 100vh;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      background: linear-gradient(180deg, #f8f0e3 0%, #efdfc5 100%);
      color: #2b241c;
      padding: 32px 22px 30px;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(214, 178, 104, 0.35);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0bb73, #9f6924);
      color: #fff8ee;
      font-size: 20px;
      box-shadow: 0 8px 18px rgba(156, 108, 40, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      line-height: 1.15;
      color: #241d17;
      letter-spacing: -0.5px;
    }

    p#subtitle {
      margin: 10px 0 26px;
      color: #5d5042;
      font-size: 1.05rem;
    }

    .field-label {
      text-align: left;
      display: block;
      font-weight: 700;
      margin: 16px 0 8px;
      color: #3d3125;
      font-size: 0.95rem;
    }

    select,
    input {
      width: 100%;
      padding: 14px 16px;
      margin: 0;
      border-radius: 14px;
      border: 1px solid #d7c3a1;
      font-size: 16px;
      outline: none;
      background: #fffaf2;
      color: #2b241c;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
    }

    select:focus,
    input:focus {
      border-color: #b88234;
      box-shadow: 0 0 0 4px rgba(184, 130, 52, 0.14);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 22px;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #generateBtn,
    #moreBtn {
      background: linear-gradient(135deg, #d6a84f, #9c6a26);
      color: #fff9f0;
      box-shadow: 0 10px 20px rgba(156, 106, 38, 0.22);
    }

    #copyBtn {
      background: #2d241b;
      color: #f7ead2;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.14);
    }

    #copyBtn,
    #moreBtn {
      display: none;
    }

    .result {
      margin-top: 28px;
      text-align: left;
      background: #fffaf4;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid #ead6b4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
      display: none;
    }

    .result-title {
      margin: 0 0 16px;
      color: #8b5e1b;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .idea {
      margin-bottom: 16px;
      padding: 16px 16px 18px;
      border-radius: 14px;
      background: linear-gradient(180deg, #fffdf9 0%, #f8f0e3 100%);
      border: 1px solid #eddcbc;
      line-height: 1.55;
    }

    .idea:last-child {
      margin-bottom: 0;
    }

    .idea-name {
      display: block;
      color: #2e241a;
      font-size: 1.05rem;
      margin-bottom: 10px;
    }

    .idea-desc {
      display: block;
      color: #4b3c2e;
      margin-bottom: 10px;
    }

    .idea-why {
      display: block;
      color: #7a5b34;
      font-style: italic;
    }

    .footer-note {
      margin-top: 26px;
      color: #6b5c49;
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px 40px;
      }

      .container {
        padding: 24px 16px 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        font-size: 17px;
      }

      .btn-row {
        flex-direction: column;
      }

      #generateBtn,
      #copyBtn,
      #moreBtn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title-wrap">
      <span class="logo-icon">✦</span>
      <h1 id="title">Business Idea Generator</h1>
      <span class="logo-icon">✦</span>
    </div>

    <p id="subtitle">Generate business ideas in seconds</p>

    <label class="field-label" id="languageLabel" for="language">Language</label>
    <select id="language" onchange="updateLanguage()">
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>

    <label class="field-label" id="interestLabel" for="interest">Industry or interest</label>
    <input id="interest" placeholder="E.g. accounting, beauty, fitness, food" />

    <div class="btn-row">
      <button id="generateBtn" onclick="generateIdeas()">Generate Ideas</button>
      <button id="moreBtn" onclick="generateMoreIdeas()">Generate More Ideas</button>
      <button id="copyBtn" onclick="copyIdeas()">Copy Ideas</button>
    </div>

    <div id="result" class="result"></div>

    <div class="footer-note" id="footerNote">Smart tools for modern entrepreneurs</div>
  </div>

  <script>
    let currentInterest = "";
    let currentLanguage = "en";
    let currentSetIndex = 0;

    const ideaSetsEn = [
      [
        {
          name: "{interest} Templates Store",
          desc: "Sell ready-to-use spreadsheets, planners, trackers, checklists or digital templates related to {interest}.",
          why: "Practical digital tools save time and are easy to scale."
        },
        {
          name: "{interest} Mini Course",
          desc: "Create a short and practical online course teaching the essentials of {interest} for beginners or small business owners.",
          why: "People prefer focused learning that gives quick results."
        },
        {
          name: "{interest} Consulting Service",
          desc: "Offer a niche consulting service for clients who need guidance or implementation support in {interest}.",
          why: "Specialized services are easier to position and sell."
        },
        {
          name: "{interest} Content Brand",
          desc: "Build a content page around {interest} and monetize through ebooks, services or partnerships.",
          why: "Niche audiences trust creators who consistently teach and help."
        },
        {
          name: "{interest} Membership Hub",
          desc: "Create a subscription-based community with resources, live sessions and exclusive materials around {interest}.",
          why: "Recurring revenue models build loyalty and long-term value."
        }
      ],
      [
        {
          name: "{interest} Audit Toolkit",
          desc: "Create a toolkit with templates, checklists and workflows for people or businesses working with {interest}.",
          why: "Professionals love ready-made systems that simplify execution."
        },
        {
          name: "{interest} Newsletter Business",
          desc: "Launch a niche newsletter focused on tips, opportunities and insights in {interest}.",
          why: "Email audiences are valuable and easier to monetize over time."
        },
        {
          name: "{interest} Done-for-You Service",
          desc: "Offer a complete service where clients outsource repetitive or technical tasks related to {interest}.",
          why: "Convenience sells well when people want results without doing the work."
        },
        {
          name: "{interest} Digital Resource Library",
          desc: "Build a paid resource hub with guides, templates, video lessons and tools related to {interest}.",
          why: "People pay for curated and organized knowledge."
        },
        {
          name: "{interest} Workshop Series",
          desc: "Host live or recorded workshops teaching practical applications of {interest}.",
          why: "Workshops feel valuable, direct and easy to market."
        }
      ],
      [
        {
          name: "{interest} Starter Pack",
          desc: "Sell a beginner-friendly package with guides, tools and templates for anyone starting in {interest}.",
          why: "Beginners are often willing to pay for clarity and structure."
        },
        {
          name: "{interest} Community Page",
          desc: "Create a niche page about {interest} and turn it into a business through sponsorships and paid resources.",
          why: "Attention can be monetized when the audience is specific and engaged."
        },
        {
          name: "{interest} Strategy Sessions",
          desc: "Offer one-to-one strategy sessions to help clients solve specific problems in {interest}.",
          why: "Personalized support commands higher prices."
        },
        {
          name: "{interest} Productized Service",
          desc: "Turn a recurring service in {interest} into a fixed offer with a clear scope and price.",
          why: "Simple offers are easier to sell and deliver."
        },
        {
          name: "{interest} Niche Ebook Brand",
          desc: "Create premium ebooks or playbooks focused on solving key pain points in {interest}.",
          why: "Digital products have low cost and strong profit potential."
        }
      ]
    ];

    const ideaSetsPt = [
      [
        {
          name: "Loja de Templates de {interest}",
          desc: "Vender folhas de cálculo, planners, trackers, checklists ou templates digitais relacionados com {interest}.",
          why: "Ferramentas práticas poupam tempo e são fáceis de escalar."
        },
        {
          name: "Mini Curso de {interest}",
          desc: "Criar um curso online curto e prático para ensinar o essencial de {interest} a iniciantes ou pequenos empresários.",
          why: "As pessoas preferem aprendizagem objetiva e com resultados rápidos."
        },
        {
          name: "Serviço de Consultoria em {interest}",
          desc: "Oferecer um serviço de consultoria de nicho para clientes que precisam de orientação ou apoio de implementação em {interest}.",
          why: "Serviços especializados são mais fáceis de posicionar e vender."
        },
        {
          name: "Marca de Conteúdo sobre {interest}",
          desc: "Criar uma página de conteúdo sobre {interest} e monetizar através de ebooks, serviços ou parcerias.",
          why: "Audiências de nicho confiam mais em quem ensina e ajuda com consistência."
        },
        {
          name: "Comunidade de Subscrição de {interest}",
          desc: "Criar uma comunidade paga com recursos, sessões ao vivo e materiais exclusivos sobre {interest}.",
          why: "Modelos de receita recorrente criam lealdade e valor a longo prazo."
        }
      ],
      [
        {
          name: "Kit Profissional de {interest}",
          desc: "Criar um kit com templates, checklists e fluxos de trabalho para pessoas ou negócios que trabalham com {interest}.",
          why: "Os profissionais valorizam sistemas prontos a usar."
        },
        {
          name: "Newsletter de {interest}",
          desc: "Lançar uma newsletter de nicho com dicas, oportunidades e insights sobre {interest}.",
          why: "Audiências por email são valiosas e mais fáceis de monetizar."
        },
        {
          name: "Serviço Feito por Ti em {interest}",
          desc: "Oferecer um serviço completo onde o cliente delega tarefas repetitivas ou técnicas ligadas a {interest}.",
          why: "A conveniência vende bem quando as pessoas querem resultados sem fazer tudo sozinhas."
        },
        {
          name: "Biblioteca Digital de {interest}",
          desc: "Criar uma biblioteca paga com guias, templates, aulas em vídeo e ferramentas relacionadas com {interest}.",
          why: "As pessoas pagam por conhecimento organizado e curado."
        },
        {
          name: "Série de Workshops de {interest}",
          desc: "Criar workshops ao vivo ou gravados com aplicações práticas de {interest}.",
          why: "Workshops têm uma perceção de valor forte e são fáceis de vender."
        }
      ],
      [
        {
          name: "Starter Pack de {interest}",
          desc: "Vender um pack inicial com guias, ferramentas e templates para quem está a começar em {interest}.",
          why: "Quem começa valoriza muito clareza e estrutura."
        },
        {
          name: "Página Comunidade de {interest}",
          desc: "Criar uma página de nicho sobre {interest} e transformá-la em negócio com patrocínios e recursos pagos.",
          why: "A atenção pode ser monetizada quando a audiência é específica e envolvida."
        },
        {
          name: "Sessões Estratégicas de {interest}",
          desc: "Oferecer sessões individuais para ajudar clientes a resolver problemas específicos relacionados com {interest}.",
          why: "O apoio personalizado permite cobrar melhor."
        },
        {
          name: "Serviço Padronizado de {interest}",
          desc: "Transformar um serviço recorrente em {interest} numa oferta com escopo e preço bem definidos.",
          why: "Ofertas simples são mais fáceis de vender e entregar."
        },
        {
          name: "Marca de Ebooks de {interest}",
          desc: "Criar ebooks ou playbooks premium focados em resolver problemas-chave ligados a {interest}.",
          why: "Produtos digitais têm baixo custo e boa margem de lucro."
        }
      ]
    ];

    function capitalizeText(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function fillTemplate(text, interest) {
      return text.replaceAll("{interest}", interest);
    }

    function updateLanguage() {
      let language = document.getElementById("language").value;
      currentLanguage = language;

      if (language === "pt") {
        document.getElementById("title").innerText = "Gerador de Ideias de Negócio";
        document.getElementById("subtitle").innerText = "Gera ideias de negócio em segundos";
        document.getElementById("languageLabel").innerText = "Idioma";
        document.getElementById("interestLabel").innerText = "Indústria ou interesse";
        document.getElementById("interest").placeholder = "Ex.: contabilidade, beleza, fitness, comida";
        document.getElementById("generateBtn").innerText = "Gerar Ideias";
        document.getElementById("moreBtn").innerText = "Gerar Mais Ideias";
        document.getElementById("copyBtn").innerText = "Copiar Ideias";
        document.getElementById("footerNote").innerText = "Ferramentas inteligentes para empreendedores modernos";
      } else {
        document.getElementById("title").innerText = "Business Idea Generator";
        document.getElementById("subtitle").innerText = "Generate business ideas in seconds";
        document.getElementById("languageLabel").innerText = "Language";
        document.getElementById("interestLabel").innerText = "Industry or interest";
        document.getElementById("interest").placeholder = "E.g. accounting, beauty, fitness, food";
        document.getElementById("generateBtn").innerText = "Generate Ideas";
        document.getElementById("moreBtn").innerText = "Generate More Ideas";
        document.getElementById("copyBtn").innerText = "Copy Ideas";
        document.getElementById("footerNote").innerText = "Smart tools for modern entrepreneurs";
      }
    }

    function renderIdeas() {
      const language = currentLanguage;
      const rawInterest = currentInterest.trim();
      const capitalizedInterest = capitalizeText(rawInterest);

      const selectedSet =
        language === "pt"
          ? ideaSetsPt[currentSetIndex % ideaSetsPt.length]
          : ideaSetsEn[currentSetIndex % ideaSetsEn.length];

      let html = "";

      if (language === "pt") {
        html += "<div class='result-title'>Ideias geradas para: <b>" + capitalizedInterest + "</b></div>";
      } else {
        html += "<div class='result-title'>Ideas generated for: <b>" + capitalizedInterest + "</b></div>";
      }

      selectedSet.forEach(function (idea, index) {
        html += "<div class='idea'>";
        html += "<span class='idea-name'><b>" + (index + 1) + ". " + fillTemplate(idea.name, capitalizedInterest) + "</b></span>";
        html += "<span class='idea-desc'>" + fillTemplate(idea.desc, rawInterest) + "</span>";
        html += "<span class='idea-why'>" + fillTemplate(idea.why, rawInterest) + "</span>";
        html += "</div>";
      });

      document.getElementById("result").innerHTML = html;
      document.getElementById("result").style.display = "block";
      document.getElementById("copyBtn").style.display = "inline-block";
      document.getElementById("moreBtn").style.display = "inline-block";
    }

    function generateIdeas() {
      const interest = document.getElementById("interest").value.trim();
      const language = document.getElementById("language").value;

      if (interest === "") {
        if (language === "pt") {
          alert("Introduz um interesse.");
        } else {
          alert("Please enter an interest.");
        }
        return;
      }

      currentInterest = interest;
      currentLanguage = language;
      currentSetIndex = 0;

      renderIdeas();
    }

    function generateMoreIdeas() {
      if (!currentInterest.trim()) {
        if (currentLanguage === "pt") {
          alert("Gera primeiro as ideias iniciais.");
        } else {
          alert("Generate the first ideas before asking for more.");
        }
        return;
      }

      currentSetIndex++;
      renderIdeas();
    }

    function copyIdeas() {
      let resultText = document.getElementById("result").innerText;
      let language = document.getElementById("language").value;

      if (!resultText.trim()) {
        if (language === "pt") {
          alert("Ainda não há ideias para copiar.");
        } else {
          alert("There are no ideas to copy yet.");
        }
        return;
      }

      navigator.clipboard.writeText(resultText).then(function () {
        if (language === "pt") {
          alert("Ideias copiadas!");
        } else {
          alert("Ideas copied!");
        }
      });
    }

    updateLanguage();
  </script>
</body>
</html>
